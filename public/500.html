<!doctype html>
<html lang="en">
  <head>
    <title>Something went wrong | PokeClo</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <style>
      body {
        background-color: #f4f4f4; /* 404と同じグレー */
        color: #333;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        text-align: center;
      }
      .container {
        padding: 20px;
      }
      h1 {
        font-size: 4rem;
        margin: 0;
        color: #d30001; /* サーバーエラーなので少し赤めに */
      }
      p {
        font-size: 1.5rem;
        margin-bottom: 2rem;
        color: #666;
      }
      .back-button {
        display: inline-block;
        background-color: #000;
        color: #fff;
        text-decoration: none;
        padding: 15px 30px;
        border-radius: 30px;
        font-weight: bold;
        font-size: 1.1rem;
        transition: transform 0.2s;
      }
      .back-button:hover {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Oops!</h1>
      <p>Something went wrong</p>
      <a href="/" class="back-button">Go back to PokeClo</a>
    </div>
  </body>
</html>
